{% extends "base.html" %}
{% block content %}

<h2>Edit Payment</h2>

<form method="POST">

<select name="rental_id" required>

{% for r in rentals %}

<option value="{{r['id']}}"
{% if r['id'] == payment['rental_id'] %}selected{% endif %}>
Rental {{r['id']}}
</option>

{% endfor %}

</select>

<input type="number"
name="amount"
value="{{payment['amount']}}"
required>

<button>Update Payment</button>

</form>

{% endblock %}
