{% extends "base.html" %}
{% block content %}

<div class="card">
<h2>🧑 Tenants</h2>

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

table{
width:80%;
margin:auto;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#333;
color:white;
}

button{
padding:6px 12px;
cursor:pointer;
border:none;
}

.add{
background:green;
color:white;
}

.edit{
background:orange;
color:white;
}

.delete{
background:red;
color:white;
}

form{
text-align:center;
margin:20px;
}
</style>

<form method="POST">
<input type="text" name="name" placeholder="Tenant Name" required>
<button class="add">Add Tenant</button>
</form>

</div>


<div class="card">

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Actions</th>
</tr>

{% for t in tenants %}

<tr>

<td>{{ t["id"] }}</td>
<td>{{ t["name"] }}</td>

<td>

<a href="/edit_tenant/{{t['id']}}">
<button class="edit">Edit</button>
</a>

<a href="/delete_tenant/{{t['id']}}" onclick="return confirm('Delete tenant?')">
<button class="delete">Delete</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
