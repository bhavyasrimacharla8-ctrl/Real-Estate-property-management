{% extends "base.html" %}
{% block content %}

<h2>Edit Rental</h2>

<form method="POST">

<select name="property_id" required>
{% for p in properties %}
<option value="{{p['id']}}"
{% if p['id'] == rental['property_id'] %}selected{% endif %}>
{{p['name']}}
</option>
{% endfor %}
</select>

<select name="tenant_id" required>
{% for t in tenants %}
<option value="{{t['id']}}"
{% if t['id'] == rental['tenant_id'] %}selected{% endif %}>
{{t['name']}}
</option>
{% endfor %}
</select>

<button>Update Rental</button>

</form>

{% endblock %}
